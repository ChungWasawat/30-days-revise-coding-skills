apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  DB_HOST: "postgres-service"   # ← service name, not localhost!
  DB_PORT: "5432"
  OUTPUT_DIR: "/app/data/output"
  BATCH_SIZE: "1000"